<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim 3D Ánh Sao Dễ Thương dành cho người đang yêu </title>
    
    <!-- Nhúng Tailwind CSS để tạo giao diện UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510; /* Nền tối vũ trụ */
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* Ngăn cuộn trang trên mobile để xoay 3D mượt hơn */
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Click xuyên qua UI */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Hiệu ứng chữ phát sáng trung tâm */
        .glowing-text {
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493, 0 0 40px #ff1493, 0 0 80px #ff1493;
            pointer-events: auto; /* Cho phép click vào chữ */
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            padding: 0 20px;
            animation: textPulse 1s infinite alternate;
        }
        @media (min-width: 768px) {
            .glowing-text { font-size: 5rem; }
        }
        @keyframes textPulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493; }
            100% { transform: scale(1.05); text-shadow: 0 0 20px #ff1493, 0 0 40px #ff1493, 0 0 80px #ff1493; }
        }
        
        /* Input chỉnh sửa tên ẩn đi ban đầu */
        #edit-container {
            pointer-events: auto;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #ff1493;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
            backdrop-filter: blur(5px);
        }
        
        /* Nút tùy chỉnh ở góc */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            pointer-events: auto;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Vùng render 3D -->
    <div id="canvas-container"></div>

    <!-- Lớp UI đè lên trên -->
    <div id="ui-layer">
        
        <!-- Chữ hiển thị ở giữa -->
        <div id="display-name" class="glowing-text" onclick="openEditor()">
            I Love You
        </div>

        <!-- Khung nhập liệu (hiện ra khi bấm vào chữ) -->
        <div id="edit-container" class="mt-4">
            <h3 class="text-pink-400 font-bold mb-2">Tùy chỉnh lời nhắn</h3>
            <input type="text" id="name-input" value="I Love You quá trời quá đất luôn" class="bg-black/50 border border-pink-500 text-white rounded-lg px-4 py-2 text-center w-64 focus:outline-none focus:ring-2 focus:ring-pink-400">
            <div class="flex gap-4 mt-2">
                <button onclick="saveName()" class="bg-pink-600 hover:bg-pink-500 text-white px-6 py-2 rounded-full transition-colors">Xong</button>
                <button onclick="closeEditor()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2 rounded-full transition-colors">Hủy</button>
            </div>
        </div>

        <div id="controls-hint">
            Chạm vào chữ để đổi tên, ví dụ Nguyễn Gia Hào <br>
            Dùng chuột / Vuốt màn hình để xoay không gian 3D
        </div>
    </div>

    <!-- Thư viện Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- XỬ LÝ GIAO DIỆN CHỮ ---
        const displayName = document.getElementById('display-name');
        const editContainer = document.getElementById('edit-container');
        const nameInput = document.getElementById('name-input');

        function openEditor() {
            displayName.style.display = 'none';
            editContainer.style.display = 'flex';
            nameInput.focus();
        }

        function closeEditor() {
            displayName.style.display = 'block';
            editContainer.style.display = 'none';
        }

        function saveName() {
            if (nameInput.value.trim() !== '') {
                displayName.innerText = nameInput.value;
            }
            closeEditor();
        }

        // Ấn Enter để lưu
        nameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') saveName();
        });

        // --- KHỞI TẠO MÔI TRƯỜNG 3D ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enablePan = false;

        // --- TẠO TEXTURE PHÁT SÁNG CHO PARTICLE ---
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 100, 150, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 20, 147, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }
        const particleTexture = createGlowTexture();

        // --- TẠO TRÁI TIM 3D BẰNG TOÁN HỌC (VOLUMETRIC HEART) ---
        const particleCount = 15000;
        const positions = [];
        const colors = [];
        const sizes = [];
        const baseScales = []; // Lưu lại vị trí gốc để làm hiệu ứng đập

        const color1 = new THREE.Color(0xff1493); // Hồng đậm
        const color2 = new THREE.Color(0xffb6c1); // Hồng nhạt
        const color3 = new THREE.Color(0x8a2be2); // Tím

        let pointsAdded = 0;
        
        // Thuật toán quét điểm ngẫu nhiên trong 1 khối, nếu điểm nằm trong phương trình trái tim thì giữ lại
        while (pointsAdded < particleCount) {
            // Random tọa độ trong vùng hộp
            const x = (Math.random() - 0.5) * 40;
            const y = (Math.random() - 0.5) * 40;
            const z = (Math.random() - 0.5) * 40;

            // Chuyển đổi tỷ lệ để khớp với phương trình toán học
            const mathX = x / 12;
            const mathY = z / 12; // Đổi Y và Z để trái tim đứng thẳng
            const mathZ = y / 12;

            // Phương trình trái tim 3D: (x^2 + (9/4)y^2 + z^2 - 1)^3 - x^2*z^3 - (9/80)y^2*z^3 < 0
            const a = mathX * mathX + 2.25 * mathY * mathY + mathZ * mathZ - 1;
            const val = (a * a * a) - (mathX * mathX * mathZ * mathZ * mathZ) - (0.1125 * mathY * mathY * mathZ * mathZ * mathZ);

            if (val <= 0.0) {
                // Điểm nằm trong trái tim
                positions.push(x, y, z);
                
                // Random màu sắc để trái tim lung linh hơn
                const colorRatio = Math.random();
                let pColor = color1;
                if (colorRatio > 0.6) pColor = color2;
                if (colorRatio > 0.9) pColor = color3;
                
                colors.push(pColor.r, pColor.g, pColor.b);
                
                // Random kích thước hạt
                sizes.push(Math.random() * 2 + 0.5);
                baseScales.push(Math.random()); // Phase ngẫu nhiên cho từng hạt

                pointsAdded++;
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

        // Shader Material tùy chỉnh để hỗ trợ kích thước và màu riêng biệt cho từng hạt
        const material = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            map: particleTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.9
        });

        const heartParticles = new THREE.Points(geometry, material);
        scene.add(heartParticles);

        // --- TẠO CÁC HẠT BỤI SAO LƠ LỬNG XUNG QUANH ---
        const bgParticleCount = 3000;
        const bgPositions = new Float32Array(bgParticleCount * 3);
        for (let i = 0; i < bgParticleCount * 3; i++) {
            bgPositions[i] = (Math.random() - 0.5) * 200;
        }
        const bgGeometry = new THREE.BufferGeometry();
        bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        const bgMaterial = new THREE.PointsMaterial({
            size: 0.5,
            color: 0xffaacc,
            map: particleTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.4
        });
        const backgroundStars = new THREE.Points(bgGeometry, bgMaterial);
        scene.add(backgroundStars);

        // --- VÒNG LẶP ANIMATION (HIỆU ỨNG ĐẬP) ---
        const clock = new THREE.Clock();
        
        // Cấu hình nhịp đập
        const beatSpeed = 5; 
        const maxScale = 1.1;
        const minScale = 0.95;

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Hiệu ứng nhịp đập trái tim (Heartbeat math pattern)
            // Sử dụng hàm sin kết hợp với pow để tạo nhịp đập giật giống tim thật
            let beat = Math.pow(Math.abs(Math.sin(time * beatSpeed)), 10);
            let scale = minScale + (maxScale - minScale) * beat;
            
            // Nếu không muốn giật mạnh, dùng sin bình thường:
            // let scale = 1.0 + Math.sin(time * 3) * 0.05;

            heartParticles.scale.set(scale, scale, scale);

            // Bụi sao bay nhẹ nhàng
            backgroundStars.rotation.y = time * 0.02;
            backgroundStars.rotation.x = time * 0.01;

            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = function () {
            animate();
        };

        // --- RESPONSIVE KHI ĐỔI KÍCH THƯỚC MÀN HÌNH ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
